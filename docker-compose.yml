# version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legacy-app
    ports:
      - "8080:8080"
    volumes:
      # 挂载源码目录，实现热重载
      - .:/app
      # 保留 node_modules 目录，避免被覆盖
      - /app/node_modules
      # - ./node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PATH=/app/node_modules/.bin:$PATH
    # 覆盖 CMD，启动时执行 npm install
    # command: sh -c "npm install"
    # 启用交互式终端
    stdin_open: true
    tty: true
    # 健康检查（可选）
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 网络配置
    networks:
      - dev-network

  # 如果有数据库或其他服务，可以在这里添加
  # db:
  #   image: postgres:13
  #   environment:
  #     POSTGRES_DB: myapp
  #     POSTGRES_USER: user
  #     POSTGRES_PASSWORD: password
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - dev-network

networks:
  dev-network:
    driver: bridge

# 如果需要持久化存储
# volumes:
#   postgres-data: